name: Pattern Compliance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-patterns:
    runs-on: ubuntu-latest
    name: Check Pattern Compliance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none

      - name: Get Changed Pattern Files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: patterns/*.php

      - name: Skip Check (No Pattern Changes)
        if: steps.changed-files.outputs.any_changed != 'true'
        run: |
          echo "✅ No pattern files were modified in this change."
          echo "Skipping pattern compliance checks."

      - name: Run Pattern Compliance Checks
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "🔍 Checking only modified pattern files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"
          echo ""

          cat > /tmp/pattern-checker.php << 'CHECKER_EOF'
          <?php
          /**
           * Pattern Compliance Checker for Elayne Theme
           *
           * Checks patterns against CLAUDE.md rules for code quality and WordPress standards.
           *
           * Validation-only build for CI: this file is in sync with the canonical checker
           * at scripts/elayne/pattern-check/class-patterncompliancechecker.php in the
           * monorepo, but with the --autofix path stripped (CI must report, never mutate)
           * and WooCommerce-specific checks removed (the standalone elayne distribution
           * repo carries no woo-* patterns).
           *
           * @package Elayne
           * @since 1.0.0
           */
          class PatternComplianceChecker {
          	private $pattern_dir;
          	private $issues = array();
          	private $passed = array();

          	public function __construct( $pattern_dir ) {
          		$this->pattern_dir = rtrim( $pattern_dir, '/' );
          	}

          	public function check_all_patterns( $files = array() ) {
          		if ( empty( $files ) ) {
          			$patterns = glob( $this->pattern_dir . '/*.php' );
          		} else {
          			$patterns = $files;
          		}

          		foreach ( $patterns as $pattern_file ) {
          			$pattern_name = basename( $pattern_file );
          			$content      = file_get_contents( $pattern_file );

          			$issues = array();

          			$is_template   = 0 === strpos( $pattern_name, 'template-' );
          			$is_header     = 0 === strpos( $pattern_name, 'header-' );
          			$is_footer     = 0 === strpos( $pattern_name, 'footer-' );
          			$is_structural = $is_template || $is_header || $is_footer;

          			// Hardcoded font-size values (font-size only — padding/margin/border-radius come from semantic vars).
          			if ( preg_match( '/(font-size):\s*\d+\.?\d*(px|rem|em)/', $content ) ) {
          				$issues[] = 'Hardcoded CSS values found (use semantic variables)';
          			}

          			// Spacer blocks.
          			if ( false !== strpos( $content, '<!-- wp:spacer ' ) ) {
          				$issues[] = 'Spacer blocks found (use blockGap instead)';
          			}

          			// Emoji icons.
          			if ( preg_match( '/[🅿🍽📶♿🎉🍷🅿️🍽️📶️♿️🎉️🍷️]/u', $content ) ) {
          				$issues[] = 'Emoji icons found (use SVG icons instead)';
          			}

          			// HTML comments between an opening tag and a wp:* block comment.
          			if ( preg_match( '/<div[^>]*>\s+<!--\s*(?!\/?\s*wp:)[^-]/', $content ) ) {
          				$issues[] = 'HTML comments between opening tags and block comments (causes validation errors)';
          			}

          			// Margin reset on full-width patterns.
          			if ( false !== strpos( $content, 'alignfull' ) &&
          				( false === strpos( $content, '"margin":{"top":"0","bottom":"0"}' ) &&
          				false === strpos( $content, 'margin-top:0;margin-bottom:0' ) ) ) {
          				$issues[] = 'Full-width pattern missing margin reset';
          			}

          			// wp:columns with 3+ direct columns in content patterns.
          			if ( ! $is_structural && false !== strpos( $content, 'wp:columns' ) ) {
          				$lines               = explode( "\n", $content );
          				$depth               = 0;
          				$current_block_lines = array();
          				$top_level_blocks    = array();

          				foreach ( $lines as $line ) {
          					if ( false !== strpos( $line, '<!-- wp:columns' ) ) {
          						if ( 0 === $depth ) {
          							$current_block_lines = array();
          						}
          						$current_block_lines[] = $line;
          						$depth++;
          					} elseif ( false !== strpos( $line, '<!-- /wp:columns -->' ) ) {
          						$current_block_lines[] = $line;
          						$depth--;
          						if ( 0 === $depth ) {
          							$top_level_blocks[] = implode( "\n", $current_block_lines );
          						}
          					} elseif ( $depth > 0 ) {
          						$current_block_lines[] = $line;
          					}
          				}

          				foreach ( $top_level_blocks as $block ) {
          					$block_lines    = explode( "\n", $block );
          					$col_depth      = 0;
          					$direct_columns = 0;

          					foreach ( $block_lines as $line ) {
          						if ( false !== strpos( $line, '<!-- wp:columns' ) ) {
          							$col_depth++;
          						} elseif ( false !== strpos( $line, '<!-- /wp:columns -->' ) ) {
          							$col_depth--;
          						} elseif ( false !== strpos( $line, '<!-- wp:column' ) && 1 === $col_depth ) {
          							$direct_columns++;
          						}
          					}

          					if ( $direct_columns >= 3 ) {
          						$issues[] = 'Using wp:columns for 3+ columns instead of responsive grid layout (use minimumColumnWidth)';
          						break;
          					}
          				}
          			}

          			// Hardcoded media IDs.
          			if ( preg_match( '/"id":\d+/', $content ) ) {
          				$issues[] = 'Hardcoded media IDs found';
          			}

          			// Custom-domain placeholder emails (only example@example.com is acceptable).
          			if ( preg_match( '/[a-zA-Z0-9._%+\-]+@(?!example\.com)[a-zA-Z0-9.\-]+\.[a-zA-Z]{2,}/', $content ) ) {
          				$issues[] = 'Custom domain email found — use example@example.com instead (WP.org requirement)';
          			}

          			// Hardcoded external URLs in src attributes.
          			if ( preg_match( '/src=["\']https?:\/\//', $content ) ) {
          				$issues[] = 'Hardcoded external URL in src attribute — use get_template_directory_uri() instead';
          			}

          			// wp:button with root-level fontSize preset slug (silently ignored — must be nested under style.typography).
          			if ( preg_match( '/<!-- wp:button\s[^\n]*"fontSize":"(?:xx-small|x-small|small|base|medium|large|x-large|xx-large)"/', $content ) ) {
          				$issues[] = 'wp:button has root-level fontSize — use "style":{"typography":{"fontSize":"var:preset|font-size|base"}} instead; root fontSize on wp:button causes block validation errors';
          			}

          			// wp:button with className after style in JSON (root attrs must come before style).
          			if ( preg_match_all( '/<!-- wp:button\s+(\{[^\n]+\})\s*(?:\/)?-->/', $content, $btn_attr_matches ) ) {
          				foreach ( $btn_attr_matches[1] as $btn_json ) {
          					$btn_style_pos = strpos( $btn_json, '"style":' );
          					$btn_class_pos = strpos( $btn_json, '"className":' );
          					if ( false !== $btn_style_pos && false !== $btn_class_pos && $btn_style_pos < $btn_class_pos ) {
          						$issues[] = 'wp:button has className after style in JSON — move className before style (root-level attributes must come first)';
          						break;
          					}
          				}
          			}

          			// Cover with style.dimensions.minHeight but missing root-level minHeight integer.
          			foreach ( explode( "\n", $content ) as $cover_ln ) {
          				if ( false === strpos( $cover_ln, '<!-- wp:cover' ) ) {
          					continue;
          				}
          				if ( preg_match( '/"minHeight":"[0-9]+px"/', $cover_ln ) && ! preg_match( '/"minHeight":[0-9]+[,}]/', $cover_ln ) ) {
          					$issues[] = 'Cover block has style.dimensions.minHeight but missing root minHeight/minHeightUnit — rendered div will be missing min-height inline style, causing block validation failure';
          					break;
          				}
          			}

          			// Group with overflow:hidden as inline style (not a WP block attribute).
          			if ( preg_match( '/<div[^>]+class="[^"]*wp-block-group[^"]*"[^>]*style="[^"]*overflow:\s*hidden/', $content ) ) {
          				$issues[] = 'Group block has overflow:hidden as inline style — not a WP block attribute, causes JSON/HTML validation mismatch. Move to a CSS class via className instead.';
          			}

          			// Element with opacity as inline style (not a standard block attribute).
          			if ( preg_match( '/<(?:p|div|h[1-6]|span)[^>]+style="[^"]*opacity:\s*0\.[0-9]+/', $content ) ) {
          				$issues[] = 'Element has opacity as inline style — not a standard WP block attribute, causes JSON/HTML validation mismatch. Use a className with CSS instead.';
          			}

          			// Heading/paragraph with root-level fontSize / fontFamily preset missing the matching has-* class on the element.
          			$font_preset_issues = array();
          			$font_size_slugs    = array( 'xx-small', 'x-small', 'small', 'base', 'medium', 'large', 'x-large', 'xx-large' );
          			$lines              = explode( "\n", $content );
          			$total_lines        = count( $lines );
          			for ( $i = 0; $i < $total_lines; $i++ ) {
          				$line = $lines[ $i ];
          				if ( false === strpos( $line, '<!-- wp:heading' ) && false === strpos( $line, '<!-- wp:paragraph' ) ) {
          					continue;
          				}
          				foreach ( $font_size_slugs as $slug ) {
          					if ( false !== strpos( $line, '"fontSize":"' . $slug . '"' ) ) {
          						if ( false !== strpos( $line, '"typography"' ) ) {
          							continue;
          						}
          						$expected_class = 'has-' . $slug . '-font-size';
          						$found_class    = false;
          						for ( $j = $i + 1; $j <= $i + 3 && $j < $total_lines; $j++ ) {
          							$html_line = $lines[ $j ];
          							if ( preg_match( '/<(?:h[1-6]|p)[^>]*class="[^"]*' . preg_quote( $expected_class, '/' ) . '[^"]*"/', $html_line ) ) {
          								$found_class = true;
          								break;
          							}
          							if ( false !== strpos( $html_line, '<!-- wp:' ) ) {
          								break;
          							}
          						}
          						if ( ! $found_class ) {
          							$issue_msg = 'Block has root-level "fontSize":"' . $slug . '" but HTML element is missing class "' . $expected_class . '" — causes block validation mismatch';
          							if ( ! in_array( $issue_msg, $font_preset_issues, true ) ) {
          								$font_preset_issues[] = $issue_msg;
          							}
          						}
          					}
          				}
          				if ( preg_match( '/"fontFamily":"var:preset\|font-family\|([a-z0-9_-]+)"/', $line, $ff_match ) ) {
          					if ( false !== strpos( $line, '"typography"' ) ) {
          						continue;
          					}
          					$ff_slug        = $ff_match[1];
          					$expected_class = 'has-' . str_replace( array( ':', '|', '/' ), '-', 'var:preset|font-family|' . $ff_slug ) . '-font-family';
          					$found_class    = false;
          					for ( $j = $i + 1; $j <= $i + 3 && $j < $total_lines; $j++ ) {
          						$html_line = $lines[ $j ];
          						if ( preg_match( '/<(?:h[1-6]|p)[^>]*class="[^"]*' . preg_quote( $expected_class, '/' ) . '[^"]*"/', $html_line ) ) {
          							$found_class = true;
          							break;
          						}
          						if ( false !== strpos( $html_line, '<!-- wp:' ) ) {
          							break;
          						}
          					}
          					if ( ! $found_class ) {
          						$issue_msg = 'Block has root-level fontFamily preset "' . $ff_slug . '" but HTML element is missing class "' . $expected_class . '" — causes block validation mismatch';
          						if ( ! in_array( $issue_msg, $font_preset_issues, true ) ) {
          							$font_preset_issues[] = $issue_msg;
          						}
          					}
          				}
          			}
          			$issues = array_merge( $issues, $font_preset_issues );

          			// WP 6.6+ inline gap/margin rules for groups and columns.
          			$blockgap_issues = array();
          			$lines           = explode( "\n", $content );
          			$total_lines     = count( $lines );
          			for ( $i = 0; $i < $total_lines; $i++ ) {
          				$line       = $lines[ $i ];
          				$is_group   = false !== strpos( $line, '<!-- wp:group' );
          				$is_columns = false !== strpos( $line, '<!-- wp:columns' );
          				if ( false !== strpos( $line, '<!-- wp:column ' ) || '<!-- wp:column-->' === trim( $line ) ) {
          					continue;
          				}
          				if ( ! $is_group && ! $is_columns ) {
          					continue;
          				}
          				if ( ! preg_match( '/"blockGap":"([^"]+)"/', $line, $bg_match ) ) {
          					continue;
          				}
          				$block_gap_value = $bg_match[1];

          				$layout_type = 'default';
          				if ( $is_group && preg_match( '/"layout":\s*\{"type":"([^"]+)"/', $line, $layout_match ) ) {
          					$layout_type = $layout_match[1];
          				}

          				if ( 0 === strpos( $block_gap_value, 'var:preset|' ) ) {
          					$css_gap = 'var(--wp--' . str_replace( array( 'var:preset|', '|' ), array( 'preset--', '--' ), $block_gap_value ) . ')';
          				} else {
          					$css_gap = $block_gap_value;
          				}

          				$has_inline_gap    = false;
          				$has_inline_margin = false;
          				$found_div         = false;
          				for ( $j = $i + 1; $j <= $i + 3 && $j < $total_lines; $j++ ) {
          					$html_line      = $lines[ $j ];
          					$is_group_div   = false !== strpos( $html_line, '<div class="wp-block-group' ) || false !== strpos( $html_line, "<div class='wp-block-group" );
          					$is_columns_div = false !== strpos( $html_line, '<div class="wp-block-columns' ) || false !== strpos( $html_line, "<div class='wp-block-columns" );
          					if ( $is_group_div || $is_columns_div ) {
          						$found_div = true;
          						if ( false !== strpos( $html_line, 'gap:' ) ) {
          							$has_inline_gap = true;
          						}
          						if ( false !== strpos( $html_line, 'margin' ) && ( false !== strpos( $html_line, 'margin:' ) || false !== strpos( $html_line, 'margin-' ) ) ) {
          							$has_inline_margin = true;
          						}
          						break;
          					}
          					if ( false !== strpos( $html_line, '<!-- wp:' ) ) {
          						break;
          					}
          				}

          				if ( $is_group ) {
          					$is_zero_gap = '0' === $block_gap_value;

          					if ( 'flex' === $layout_type && ! $has_inline_gap && ! $is_zero_gap ) {
          						$issue_msg = 'Group with layout:flex has "blockGap":"' . $block_gap_value . '" but HTML div is missing gap:' . $css_gap . ' in style attribute — flex layout requires inline gap';
          						if ( ! in_array( $issue_msg, $blockgap_issues, true ) ) {
          							$blockgap_issues[] = $issue_msg;
          						}
          					}
          					if ( ( 'constrained' === $layout_type || 'default' === $layout_type ) && $has_inline_gap ) {
          						$issue_msg = 'Group with layout:' . $layout_type . ' has inline gap: style but WordPress 6.6+ handles gap via layout CSS — remove gap: from HTML style attribute';
          						if ( ! in_array( $issue_msg, $blockgap_issues, true ) ) {
          							$blockgap_issues[] = $issue_msg;
          						}
          					}
          					if ( 'flex' === $layout_type && $is_zero_gap && $has_inline_gap ) {
          						$issue_msg = 'Group with layout:flex and blockGap:0 has inline gap: style but WordPress 6.6+ does not output gap for zero values — remove gap:0 from HTML style attribute';
          						if ( ! in_array( $issue_msg, $blockgap_issues, true ) ) {
          							$blockgap_issues[] = $issue_msg;
          						}
          					}
          					if ( 'flex' === $layout_type && $has_inline_margin ) {
          						$issue_msg = 'Group with layout:flex has inline margin: style but WordPress 6.6+ handles flex group margins via layout CSS — remove margin: from HTML style attribute';
          						if ( ! in_array( $issue_msg, $blockgap_issues, true ) ) {
          							$blockgap_issues[] = $issue_msg;
          						}
          					}
          				} elseif ( $is_columns ) {
          					if ( $has_inline_gap ) {
          						$issue_msg = 'Columns block has inline gap: style but WordPress 6.6+ handles column gap via block CSS — remove gap: from HTML style attribute';
          						if ( ! in_array( $issue_msg, $blockgap_issues, true ) ) {
          							$blockgap_issues[] = $issue_msg;
          						}
          					}
          					$has_inline_margin = false;
          					for ( $j = $i + 1; $j <= $i + 3 && $j < $total_lines; $j++ ) {
          						$html_line      = $lines[ $j ];
          						$is_columns_div = false !== strpos( $html_line, '<div class="wp-block-columns' ) || false !== strpos( $html_line, "<div class='wp-block-columns" );
          						if ( $is_columns_div && false !== strpos( $html_line, 'margin' ) && ( false !== strpos( $html_line, 'margin:' ) || false !== strpos( $html_line, 'margin-' ) ) ) {
          							$has_inline_margin = true;
          							break;
          						}
          						if ( false !== strpos( $html_line, '<!-- wp:' ) ) {
          							break;
          						}
          					}
          					if ( $has_inline_margin ) {
          						$issue_msg = 'Columns block has inline margin: style but WordPress 6.6+ handles column margins via layout CSS — remove margin: from HTML style attribute';
          						if ( ! in_array( $issue_msg, $blockgap_issues, true ) ) {
          							$blockgap_issues[] = $issue_msg;
          						}
          					}
          				}
          			}
          			$issues = array_merge( $issues, $blockgap_issues );

          			// Untranslated text strings (WP.org requirement).
          			$has_untranslated_text = false;
          			$has_untranslated_alt  = false;
          			$lines                 = explode( "\n", $content );
          			foreach ( $lines as $line ) {
          				if ( false !== strpos( $line, '<!-- wp:' ) || false !== strpos( $line, '<!-- /wp:' ) ) {
          					continue;
          				}
          				if ( 0 === strpos( trim( $line ), '$' ) ) {
          					continue;
          				}
          				if ( false !== strpos( $line, '<?php' ) ) {
          					$html_only = preg_replace( '/<\?php.*?\?>/s', '', $line );
          					$html_only = preg_replace( '/&[a-zA-Z#][a-zA-Z0-9]*;/', '', $html_only );
          					if ( preg_match( '/<(?:h[1-6]|p|a|li|button|span|figcaption|cite|blockquote|td|th|dt|dd)[^>]*>[^<{?\n]*[a-zA-Z]{3,}[^<{?\n]*<\//', $html_only ) ) {
          						$has_untranslated_text = true;
          					}
          					continue;
          				}
          				$clean_line = preg_replace( '/&[a-zA-Z#][a-zA-Z0-9]*;/', '', $line );
          				if ( preg_match( '/<(?:h[1-6]|p|a|li|button|span|figcaption|cite|blockquote|td|th|dt|dd)[^>]*>[^<{?\n]*[a-zA-Z]{3,}[^<{?\n]*<\//', $clean_line ) ) {
          					$has_untranslated_text = true;
          				}
          				if ( preg_match( '/alt="[A-Za-z][^"]*"/', $line ) ) {
          					$has_untranslated_alt = true;
          				}
          			}
          			if ( $has_untranslated_text ) {
          				$issues[] = 'Untranslated text strings in HTML tags — wrap with esc_html_e( \'Text\', \'elayne\' )';
          			}
          			if ( $has_untranslated_alt ) {
          				$issues[] = 'Untranslated alt attribute text — use alt="<?php echo esc_attr__( \'Desc\', \'elayne\' ); ?>"';
          			}

          			// Missing patternName in outermost block metadata (templates exempt).
          			if ( ! $is_template ) {
          				if ( ! preg_match( '/"patternName":"elayne\/[^"]*"/', $content ) ) {
          					$slug_hint = '';
          					if ( preg_match( '/\*\s+Slug:\s+elayne\/([^\s]+)/', $content, $slug_m ) ) {
          						$slug_hint = ' — expected: "patternName":"elayne/' . trim( $slug_m[1] ) . '" in outermost block metadata';
          					}
          					$issues[] = 'Missing "patternName" in block metadata' . $slug_hint;
          				}
          			}

          			if ( empty( $issues ) ) {
          				$this->passed[] = $pattern_name;
          			} else {
          				$this->issues[ $pattern_name ] = $issues;
          			}
          		}
          	}

          	public function get_results() {
          		return array(
          			'passed' => $this->passed,
          			'issues' => $this->issues,
          		);
          	}

          	public function print_results() {
          		$results = $this->get_results();

          		echo "\n=== Pattern Compliance Check Results ===\n\n";

          		echo '✅ PASSED (' . count( $results['passed'] ) . " patterns):\n";
          		foreach ( $results['passed'] as $pattern ) {
          			echo '  - ' . $pattern . "\n";
          		}

          		if ( ! empty( $results['issues'] ) ) {
          			echo "\n❌ ISSUES FOUND (" . count( $results['issues'] ) . " patterns):\n";
          			foreach ( $results['issues'] as $pattern => $issues ) {
          				echo "\n  " . $pattern . ":\n";
          				foreach ( $issues as $issue ) {
          					echo '    - ' . $issue . "\n";
          				}
          			}
          		} else {
          			echo "\n🎉 All patterns passed compliance checks!\n";
          		}

          		echo "\n";
          	}
          }

          // Run the checker.
          if ( 'cli' === php_sapi_name() ) {
          	$files = array_slice( $argv, 1 );

          	if ( empty( $files ) ) {
          		die( "No pattern files specified.\n" );
          	}

          	foreach ( $files as $file ) {
          		if ( ! file_exists( $file ) ) {
          			die( "Pattern file not found: " . $file . "\n" );
          		}
          	}

          	$checker = new PatternComplianceChecker( '.' );
          	$checker->check_all_patterns( $files );
          	$checker->print_results();

          	$results = $checker->get_results();
          	exit( empty( $results['issues'] ) ? 0 : 1 );
          } else {
          	die( "This script must be run from CLI.\n" );
          }
          CHECKER_EOF

          # Run checker on changed files only
          php /tmp/pattern-checker.php ${{ steps.changed-files.outputs.all_changed_files }}
