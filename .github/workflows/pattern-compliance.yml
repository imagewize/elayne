name: Pattern Compliance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-patterns:
    runs-on: ubuntu-latest
    name: Check Pattern Compliance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      # Pass 1 (wp pattern validate via WP-CLI) requires a live WordPress
      # database and must be run locally before merging. It is not run in CI.

      - name: Pass 2 — Pattern PHP compliance
        run: ./vendor/bin/pt-cli check patterns/ --theme=elayne

      - name: Pass 3a — Template HTML compliance
        run: ./vendor/bin/pt-cli check:templates templates/ --theme=elayne

      - name: Pass 3b — Template parts HTML compliance
        run: ./vendor/bin/pt-cli check:templates parts/ --theme=elayne
